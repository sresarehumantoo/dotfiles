# -- General -------------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

set -g history-limit 50000
set -g mouse on
set -g focus-events on
set -g set-clipboard on
set -sg escape-time 10
set -g repeat-time 600

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Activity
setw -g monitor-activity on
set -g visual-activity off

# -- Prefix --------------------------------------------------------------------

unbind C-b
set -g prefix M-a
bind M-a send-prefix

# -- Vi mode -------------------------------------------------------------------

set -g status-keys vi
set -g mode-keys vi

# -- Keybindings ---------------------------------------------------------------

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# New panes/windows retain current path
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Vim-style pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Window cycling
bind -r C-h previous-window
bind -r C-l next-window

# Copy-mode vim bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Mouse toggle
bind m set -g mouse \; display "mouse #{?mouse,on,off}"

# -- Theme (colors) ------------------------------------------------------------

# Palette
BAR_BG="#303030"
BAR_FG="#999999"
ACCENT="#81a2be"
CMD_BG="#3465a4"
LEFT_BG="#c5c8c6"
LEFT_FG="#303030"
RIGHT1_BG="#b5bd68"
RIGHT2_BG="#81a2be"
RIGHT3_BG="#c5c8c6"
RIGHT_FG="#303030"
LAST_FG="#81a2be"

# Pane borders
set -g pane-border-style "fg=$BAR_BG"
set -g pane-active-border-style "fg=$ACCENT"

# Messages
set -g message-style "fg=$BAR_BG,bg=$CMD_BG,bold"
set -g message-command-style "fg=$CMD_BG,bg=$BAR_BG,bold"

# Mode (copy mode highlight)
set -g mode-style "fg=$BAR_BG,bg=$CMD_BG,bold"

# Clock
setw -g clock-mode-colour "$ACCENT"
setw -g clock-mode-style 24

# -- Status bar ----------------------------------------------------------------

set -g status-interval 5
set -g status-position bottom
set -g status-style "fg=$BAR_FG,bg=$BAR_BG"

# Left: arch icon with powerline separator
set -g status-left-length 40
set -g status-left "#[fg=$LEFT_FG,bg=$LEFT_BG,bold]  \uf306  #[fg=$LEFT_BG,bg=$BAR_BG,nobold]\uE0B0 "

# Right: prefix | time | date | user | path
set -g status-right-length 120
set -g status-right "#{?client_prefix,#[fg=$CMD_BG,bg=$BAR_BG]\uE0B2#[fg=#ffffff,bg=$CMD_BG,bold] PREFIX #[fg=$RIGHT1_BG,bg=$CMD_BG]\uE0B2,#[fg=$RIGHT1_BG,bg=$BAR_BG]\uE0B2}#[fg=$RIGHT_FG,bg=$RIGHT1_BG] %R #[fg=$RIGHT2_BG,bg=$RIGHT1_BG]\uE0B2#[fg=$RIGHT_FG,bg=$RIGHT2_BG] %d %b #[fg=$RIGHT3_BG,bg=$RIGHT2_BG]\uE0B2#[fg=$RIGHT_FG,bg=$RIGHT3_BG,bold] #(whoami) | #{b:pane_current_path} "

# Window status
setw -g window-status-format "#[fg=$BAR_FG,bg=$BAR_BG] #I #W#{?window_bell_flag, !,}#{?window_zoomed_flag, Z,} "
setw -g window-status-current-format "#[fg=$BAR_BG,bg=$ACCENT]\uE0B0#[fg=$BAR_BG,bg=$ACCENT,bold] #I #W#{?window_zoomed_flag, Z,} #[fg=$ACCENT,bg=$BAR_BG]\uE0B0"
setw -g window-status-activity-style "underscore"
setw -g window-status-bell-style "fg=$CMD_BG,blink,bold"
setw -g window-status-last-style "fg=$LAST_FG"
setw -g window-status-separator ""
