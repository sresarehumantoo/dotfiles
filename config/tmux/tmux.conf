# -- General -------------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

set -g history-limit 50000
set -g mouse on
set -g focus-events on
set -g set-clipboard on
set -sg escape-time 0
set -g repeat-time 600

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Activity
setw -g monitor-activity on
set -g visual-activity off
set -g display-time 2000

# -- Prefix --------------------------------------------------------------------

unbind C-b
set -g prefix M-a
bind M-a send-prefix

# -- Vi mode -------------------------------------------------------------------

set -g status-keys vi
set -g mode-keys vi

# -- Keybindings ---------------------------------------------------------------

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Windows (tabs) — Alt+n new, Alt+1-9 switch, C-q kill
bind -n M-n new-window -c "#{pane_current_path}"
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n C-q kill-window

# Panes — Alt+Enter vsplit, Alt+| hsplit, Alt+q kill, Alt+m zoom, Alt+s break
bind -n M-Enter split-window -h -c "#{pane_current_path}"
bind -n 'M-|' split-window -v -c "#{pane_current_path}"
bind -n M-q kill-pane
bind -n M-m resize-pane -Z
bind -n M-s break-pane

# Swap windows
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# Vim-style pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Enter copy mode with Alt+c
bind -n M-c copy-mode

# Copy-mode vim bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi C-a send-keys -X start-of-line
bind -T copy-mode-vi C-e send-keys -X end-of-line

# Mouse toggle
bind m set -g mouse \; display "mouse #{?mouse,on,off}"

# -- Theme (colors) ------------------------------------------------------------

# Palette
BAR_BG="#303030"
BAR_FG="#999999"
ACCENT="#81a2be"
CMD_BG="#3465a4"
LEFT_BG="#c5c8c6"
LEFT_FG="#303030"
RIGHT1_BG="#678b9e"
RIGHT2_BG="#81a2be"
RIGHT3_BG="#a3bcd0"
RIGHT4_BG="#c5c8c6"
RIGHT_FG="#1d1f21"
LAST_FG="#81a2be"

# Pane borders
set -g pane-border-style "fg=$BAR_BG"
set -g pane-active-border-style "fg=$ACCENT"

# Messages
set -g message-style "fg=$BAR_BG,bg=$CMD_BG,bold"
set -g message-command-style "fg=$CMD_BG,bg=$BAR_BG,bold"

# Mode (copy mode highlight)
set -g mode-style "fg=$BAR_BG,bg=$CMD_BG,bold"

# Clock
setw -g clock-mode-colour "$ACCENT"
setw -g clock-mode-style 24

# -- Status bar ----------------------------------------------------------------

set -g status-interval 5
set -g status-position bottom
set -g status 2
set -g status-style "fg=$BAR_FG,bg=$BAR_BG"

# Line 0 (top, next to pane): transparent spacer
set -g 'status-format[0]' '#[bg=terminal,fill=terminal] '

# Line 1 (bottom): real status bar — uses default template so status-left/right/window-status apply
set -g 'status-format[1]' '#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]'

# Left: distro icon (detected at install time) with powerline separator
set -g status-left-length 40
set -g status-left "#[fg=$LEFT_FG,bg=$LEFT_BG,bold]  #(cat ~/.config/dfinstall/distro-icon 2>/dev/null)  #[fg=$LEFT_BG,bg=$BAR_BG,nobold]\uE0B0 "

# Right: prefix < time < date < directory < user
set -g status-right-length 120
set -g status-right "#{?client_prefix,#[fg=$CMD_BG]#[bg=$BAR_BG]\uE0B2#[fg=#ffffff]#[bg=$CMD_BG]#[bold] PREFIX #[nobold]#[fg=$RIGHT1_BG]#[bg=$CMD_BG]\uE0B2,#[fg=$RIGHT1_BG]#[bg=$BAR_BG]\uE0B2}#[fg=$RIGHT_FG,bg=$RIGHT1_BG] %R #[fg=$RIGHT2_BG,bg=$RIGHT1_BG]\uE0B2#[fg=$RIGHT_FG,bg=$RIGHT2_BG] %d %b #[fg=$RIGHT3_BG,bg=$RIGHT2_BG]\uE0B2#[fg=$RIGHT_FG,bg=$RIGHT3_BG] #{?#{==:#{pane_current_path},#{HOME}},~,#{=/24/..:#{b:pane_current_path}}} #[fg=$RIGHT4_BG,bg=$RIGHT3_BG]\uE0B2#[fg=$RIGHT_FG,bg=$RIGHT4_BG,bold] #(whoami) "

# Window status
setw -g window-status-format "#[fg=$BAR_FG,bg=$BAR_BG] #I #W#{?window_bell_flag, !,}#{?window_zoomed_flag, Z,} "
setw -g window-status-current-format "#[fg=$BAR_BG,bg=$ACCENT]\uE0B0#[fg=$BAR_BG,bg=$ACCENT,bold] #I #W#{?window_zoomed_flag, Z,} #[fg=$ACCENT,bg=$BAR_BG]\uE0B0"
setw -g window-status-activity-style "italics"
setw -g window-status-bell-style "fg=$CMD_BG,blink,bold"
setw -g window-status-last-style "fg=$LAST_FG,underscore"
setw -g window-status-separator ""

# -- Plugins (TPM) -------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-logging'

# Resurrect/continuum settings
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# Logging settings — save logs to ~/.local/share/tmux/logs
set -g @logging-path '#{HOME}/.local/share/tmux/logs'
set -g @screen-capture-path '#{HOME}/.local/share/tmux/logs'
set -g @save-complete-history-path '#{HOME}/.local/share/tmux/logs'

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
